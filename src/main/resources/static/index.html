<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #3e39c6; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="container mt-5">

<h2 class="text-center mb-4">🎓 Student Management System</h2>

<div class="card p-4 mb-4">
    <h4 class="mb-3">Add or Update Student</h4>
    <div class="row g-3">
        <div class="col-md-2">
            <label class="form-label">ID</label>
            <input type="number" id="sid" class="form-control" placeholder="101">
        </div>
        <div class="col-md-3">
            <label class="form-label">Name</label>
            <input type="text" id="sname" class="form-control" placeholder="Enter Name">
        </div>
        <div class="col-md-3">
            <label class="form-label">Address</label>
            <input type="text" id="saddress" class="form-control" placeholder="Enter Address">
        </div>
        <div class="col-md-2">
            <label class="form-label">Email</label>
            <input type="email" id="semail" class="form-control" placeholder="example@mail.com">
        </div>
        <div class="col-md-2">
            <label class="form-label">Grade</label>
            <input type="text" id="sgrade" class="form-control" placeholder="Grade">
        </div>
    </div>
    <div class="mt-3">
        <button class="btn btn-primary me-2" onclick="saveStudent()">Save Student</button>
        <button class="btn btn-warning" onclick="updateStudent()">Update Student</button>
    </div>
</div>

<div class="card p-4">
    <h4 class="mb-3">Find or Remove Student</h4>
    <div class="input-group mb-3 w-75">
        <input type="number" id="searchId" class="form-control" placeholder="Enter Student ID to Search or Delete">
        <button class="btn btn-success" onclick="getStudent()">Search</button>
        <button class="btn btn-danger" onclick="deleteStudent()">Delete</button>
    </div>
    <div id="result" class="alert alert-info d-none mt-2"></div>
</div>

<script>
    const BASE_URL = "http://localhost:8090/student";

    // 1. Save Student (POST)
    async function saveStudent() {
        const data = {
            id: document.getElementById('sid').value,
            name: document.getElementById('sname').value,
            address: document.getElementById('saddress').value,
            email: document.getElementById('semail').value,
            grade: document.getElementById('sgrade').value
        };

        try {
            const response = await fetch(`${BASE_URL}/saveStudent`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.text();
            alert(result);
        } catch (error) {
            alert("Error connecting to server!");
        }
    }

    // 2. Get Student (GET)
    async function getStudent() {
        const id = document.getElementById('searchId').value;
        if(!id) { alert("Please enter an ID!"); return; }

        try {
            const response = await fetch(`${BASE_URL}/getStudent?id=${id}`);
            const resultDiv = document.getElementById('result');

            if (response.ok) {
                const student = await response.json();
                resultDiv.innerHTML = `<strong>Found:</strong> ${student.name} | ID: ${student.id}`;
                resultDiv.classList.remove('d-none');
            } else {
                resultDiv.classList.add('d-none');
                alert("Student not found!");
            }
        } catch (error) {
            alert("Error fetching student details.");
        }
    }

    // 3. Update Student (PUT)
    async function updateStudent() {
        const data = {
            id: document.getElementById('sid').value,
            name: document.getElementById('sname').value,
            address: document.getElementById('saddress').value,
            email: document.getElementById('semail').value,
            grade: document.getElementById('sgrade').value
        };

        if (!data.id) { alert("Please enter the ID to update!"); return; }

        try {
            const response = await fetch(`${BASE_URL}/updateStudent`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(await response.text());
        } catch (error) {
            alert("Error updating student.");
        }
    }

    // 4. Delete Student (DELETE)
    async function deleteStudent() {
        const id = document.getElementById('searchId').value;

        if (!id) { alert("Please enter an ID to delete!"); return; }

        if (confirm("Are you sure you want to delete student ID: " + id + "?")) {
            try {
                const response = await fetch(`${BASE_URL}/deleteStudent/${id}`, {
                    method: 'DELETE'
                });

                const message = await response.text();
                alert(message);

                document.getElementById('result').classList.add('d-none');
                document.getElementById('searchId').value = "";
            } catch (error) {
                alert("Failed to delete student.");
            }
        }
    }
</script>
</body>
</html>
